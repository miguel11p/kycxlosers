<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" width="760" height="160">
  <defs>
    <linearGradient id="bg-va" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="160" fill="url(#bg-va)" rx="8"/>

  <!-- Red accent left bar -->
  <rect x="0" y="0" width="5" height="160" fill="#c8102e" rx="3"/>

  <!-- Checklist icon group -->
  <g transform="translate(44, 28)">
    <!-- Row 1 -->
    <circle cx="12" cy="16" r="10" fill="#c8102e"/>
    <polyline points="7,16 11,21 18,10" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="30" y="10" width="65" height="10" rx="3" fill="#444"/>

    <!-- Row 2 -->
    <circle cx="12" cy="52" r="10" fill="#c8102e"/>
    <polyline points="7,52 11,57 18,46" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="30" y="46" width="80" height="10" rx="3" fill="#444"/>

    <!-- Row 3 -->
    <circle cx="12" cy="88" r="10" fill="#c8102e"/>
    <polyline points="7,88 11,93 18,82" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="30" y="82" width="55" height="10" rx="3" fill="#444"/>
  </g>

  <!-- Text block -->
  <text x="280" y="58" font-family="'Barlow Condensed', Arial, sans-serif" font-size="25" font-weight="700" fill="#ffffff" letter-spacing="0.5">Ventajas de apostar sin verificación</text>
  <text x="280" y="86" font-family="'Barlow Condensed', Arial, sans-serif" font-size="15" fill="#aaaaaa">Privacidad · Registro instantáneo · Retiros rápidos · Sin límites</text>
  <text x="280" y="112" font-family="'Barlow Condensed', Arial, sans-serif" font-size="14" fill="#666666">6 razones por las que los apostadores eligen casas sin KYC en 2026</text>

  <!-- Trophy outline decoration -->
  <g transform="translate(680, 30)" opacity="0.25">
    <path d="M20 0 L60 0 L60 40 C60 62 42 75 40 76 C38 75 20 62 20 40 Z" fill="none" stroke="#c8102e" stroke-width="2"/>
    <rect x="32" y="76" width="16" height="10" fill="none" stroke="#c8102e" stroke-width="2"/>
    <rect x="22" y="86" width="36" height="6" rx="3" fill="none" stroke="#c8102e" stroke-width="2"/>
    <path d="M20 10 L5 10 C5 10 5 45 20 45" fill="none" stroke="#c8102e" stroke-width="2"/>
    <path d="M60 10 L75 10 C75 10 75 45 60 45" fill="none" stroke="#c8102e" stroke-width="2"/>
  </g>
