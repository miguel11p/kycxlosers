<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" width="760" height="160">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="160" fill="url(#bg1)" rx="8"/>

  <!-- Red accent left bar -->
  <rect x="0" y="0" width="5" height="160" fill="#c8102e" rx="3"/>

  <!-- Shield icon -->
  <g transform="translate(52, 40)">
    <path d="M40 0 L80 15 L80 55 C80 78 62 94 40 100 C18 94 0 78 0 55 L0 15 Z" fill="none" stroke="#c8102e" stroke-width="3"/>
    <!-- Lock body -->
    <rect x="26" y="52" width="28" height="22" rx="3" fill="#c8102e"/>
    <!-- Lock shackle -->
    <path d="M31 52 L31 43 C31 34 49 34 49 43 L49 52" fill="none" stroke="#c8102e" stroke-width="3"/>
    <!-- Keyhole -->
    <circle cx="40" cy="61" r="4" fill="#111"/>
    <rect x="38" y="63" width="4" height="6" fill="#111"/>
  </g>

  <!-- Cross-out document icon -->
  <g transform="translate(160, 38)">
    <rect x="0" y="0" width="56" height="70" rx="4" fill="none" stroke="#555" stroke-width="2"/>
    <!-- Doc lines -->
    <line x1="10" y1="20" x2="46" y2="20" stroke="#555" stroke-width="2"/>
    <line x1="10" y1="32" x2="46" y2="32" stroke="#555" stroke-width="2"/>
    <line x1="10" y1="44" x2="30" y2="44" stroke="#555" stroke-width="2"/>
    <!-- Red X cross -->
    <line x1="8" y1="8" x2="64" y2="74" stroke="#c8102e" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="64" y1="8" x2="8" y2="74" stroke="#c8102e" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Text block -->
  <text x="290" y="62" font-family="'Barlow Condensed', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="0.5">¿Qué es un casino sin KYC?</text>
  <text x="290" y="92" font-family="'Barlow Condensed', Arial, sans-serif" font-size="15" fill="#aaaaaa">Sin DNI · Sin verificación de identidad · Sin trámites</text>
  <text x="290" y="118" font-family="'Barlow Condensed', Arial, sans-serif" font-size="14" fill="#666666">Plataformas que respetan tu privacidad y permiten jugar sin documentación</text>

  <!-- Decorative dots -->
  <circle cx="710" cy="40" r="3" fill="#c8102e" opacity="0.6"/>
  <circle cx="725" cy="55" r="5" fill="#c8102e" opacity="0.3"/>
  <circle cx="740" cy="35" r="2" fill="#c8102e" opacity="0.5"/>
  <circle cx="720" cy="75" r="4" fill="#c8102e" opacity="0.2"/>
  <circle cx="748" cy="65" r="6" fill="#c8102e" opacity="0.15"/>
</svg>
