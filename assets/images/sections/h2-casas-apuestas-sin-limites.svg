<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" width="760" height="160">
  <defs>
    <linearGradient id="bg-sl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="160" fill="url(#bg-sl)" rx="8"/>

  <!-- Red accent left bar -->
  <rect x="0" y="0" width="5" height="160" fill="#c8102e" rx="3"/>

  <!-- Infinity symbol -->
  <g transform="translate(38, 48)">
    <path d="M50 32 C50 18 30 8 18 18 C6 28 6 36 18 46 C30 56 50 46 50 32 Z" fill="none" stroke="#c8102e" stroke-width="3.5"/>
    <path d="M50 32 C50 46 70 56 82 46 C94 36 94 28 82 18 C70 8 50 18 50 32 Z" fill="none" stroke="#c8102e" stroke-width="3.5"/>
  </g>

  <!-- Cap / bar with red X (no limits) -->
  <g transform="translate(168, 42)">
    <!-- Bar representing a cap -->
    <rect x="0" y="20" width="60" height="8" rx="3" fill="#444"/>
    <rect x="10" y="28" width="40" height="30" rx="3" fill="none" stroke="#555" stroke-width="2"/>
    <!-- Red X over it -->
    <line x1="0" y1="14" x2="62" y2="66" stroke="#c8102e" stroke-width="3" stroke-linecap="round"/>
    <line x1="62" y1="14" x2="0" y2="66" stroke="#c8102e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Text block -->
  <text x="292" y="60" font-family="'Barlow Condensed', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="0.5">Casas de apuestas sin límites</text>
  <text x="292" y="89" font-family="'Barlow Condensed', Arial, sans-serif" font-size="15" fill="#aaaaaa">Sin caps · Sin penalizaciones · Sin cierres de cuenta</text>
  <text x="292" y="115" font-family="'Barlow Condensed', Arial, sans-serif" font-size="14" fill="#666666">Apuesta lo que quieras sin restricciones arbitrarias ni penalizaciones por ganar</text>

  <!-- Decorative nodes -->
  <circle cx="700" cy="45" r="6" fill="none" stroke="#c8102e" stroke-width="1.5" opacity="0.5"/>
  <circle cx="730" cy="70" r="6" fill="none" stroke="#c8102e" stroke-width="1.5" opacity="0.4"/>
  <circle cx="748" cy="40" r="4" fill="none" stroke="#c8102e" stroke-width="1.5" opacity="0.3"/>
  <line x1="706" y1="45" x2="724" y2="70" stroke="#c8102e" stroke-width="1" opacity="0.3"/>
  <line x1="736" y1="70" x2="744" y2="44" stroke="#c8102e" stroke-width="1" opacity="0.3"/>
  <line x1="748" y1="44" x2="706" y2="45" stroke="#c8102e" stroke-width="1" opacity="0.2"/>
</svg>
