<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 160" width="760" height="160">
  <defs>
    <linearGradient id="bg-cc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="160" fill="url(#bg-cc)" rx="8"/>

  <!-- Red accent left bar -->
  <rect x="0" y="0" width="5" height="160" fill="#c8102e" rx="3"/>

  <!-- Bitcoin icon -->
  <g transform="translate(42, 30)">
    <circle cx="48" cy="50" r="48" fill="none" stroke="#c8102e" stroke-width="3"/>
    <text x="32" y="68" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#c8102e">₿</text>
  </g>

  <!-- ETH diamond -->
  <g transform="translate(160, 42)">
    <polygon points="26,0 52,28 26,40 0,28" fill="none" stroke="#888" stroke-width="2"/>
    <polygon points="26,40 52,28 26,76 0,28" fill="none" stroke="#888" stroke-width="2"/>
    <line x1="26" y1="0" x2="26" y2="76" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- USDT pill -->
  <g transform="translate(230, 55)">
    <rect x="0" y="0" width="64" height="28" rx="14" fill="none" stroke="#555" stroke-width="2"/>
    <text x="12" y="19" font-family="'Barlow Condensed', Arial, sans-serif" font-size="14" font-weight="700" fill="#555">USDT</text>
  </g>

  <!-- Text block -->
  <text x="320" y="60" font-family="'Barlow Condensed', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="0.5">Casas de apuestas cripto sin KYC</text>
  <text x="320" y="89" font-family="'Barlow Condensed', Arial, sans-serif" font-size="15" fill="#aaaaaa">BTC · ETH · USDT · LTC · DOGE y más criptomonedas</text>
  <text x="320" y="115" font-family="'Barlow Condensed', Arial, sans-serif" font-size="14" fill="#666666">Retiros anónimos en minutos, sin vinculación bancaria ni documentación</text>

  <!-- Blockchain nodes decoration -->
  <circle cx="700" cy="45" r="6" fill="none" stroke="#c8102e" stroke-width="1.5" opacity="0.5"/>
  <circle cx="730" cy="70" r="6" fill="none" stroke="#c8102e" stroke-width="1.5" opacity="0.4"/>
  <circle cx="748" cy="40" r="4" fill="none" stroke="#c8102e" stroke-width="1.5" opacity="0.3"/>
  <line x1="706" y1="45" x2="724" y2="70" stroke="#c8102e" stroke-width="1" opacity="0.3"/>
  <line x1="736" y1="70" x2="744" y2="44" stroke="#c8102e" stroke-width="1" opacity="0.3"/>
  <line x1="748" y1="44" x2="706" y2="45" stroke="#c8102e" stroke-width="1" opacity="0.2"/>
</svg>
